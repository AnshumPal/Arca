name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: arca
          POSTGRES_PASSWORD: arca
          POSTGRES_DB: arca
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arca"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://arca:arca@localhost:5432/arca
      TEST_DATABASE_URL: postgresql+asyncpg://arca:arca@localhost:5432/arca
      OPENAI_API_KEY: sk-test-placeholder
      OPENAI_MODEL: gpt-4o-mini
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build .

  # Railway auto-deploys on push via GitHub integration — no CI step needed.
  # This job just confirms the deployment URL is reachable after Railway deploys.
  verify-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.RAILWAY_URL != ''

    steps:
      - name: Wait for Railway deploy
        run: sleep 30

      - name: Health check live URL
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            ${{ vars.RAILWAY_URL }}/health
